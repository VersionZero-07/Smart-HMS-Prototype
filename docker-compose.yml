version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: healthnode-db
    environment:
      POSTGRES_USER: healthnode
      POSTGRES_PASSWORD: healthnode_secret
      POSTGRES_DB: healthnode
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthnode"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: healthnode-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthnode-backend
    environment:
      DATABASE_URL: postgresql://healthnode:healthnode_secret@postgres:5432/healthnode
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: healthnode-jwt-secret-key-change-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://frontend:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && python -m app.ml.train_severity && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthnode-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
